<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealTimeBus - 新生村 53 線實時到站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #e0f7ff 0%, #fff5f0 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1a1a1a;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 5%;
            left: 5%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(23, 162, 184, 0.1) 0%, rgba(23, 162, 184, 0.02) 100%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 10%;
            right: 5%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 193, 7, 0.08) 0%, rgba(255, 193, 7, 0.02) 100%);
            border-radius: 50%;
            animation: float 10s ease-in-out infinite 2s;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(20px) translateX(10px); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(23, 162, 184, 0.12);
            overflow: hidden;
            border: 1px solid #d4ecf0;
        }

        header {
            background: linear-gradient(135deg, #17a2b8 0%, #0d7f94 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        main {
            padding: 32px 28px;
            background: white;
        }

        .station-header {
            background: linear-gradient(135deg, #17a2b8 0%, #0d7f94 100%);
            color: white;
            padding: 20px 22px;
            border-radius: 9px;
            margin-bottom: 20px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(23, 162, 184, 0.15);
            transition: all 0.3s ease;
        }

        .station-header:hover {
            box-shadow: 0 4px 12px rgba(23, 162, 184, 0.25);
            transform: translateY(-2px);
        }

        .station-header h2 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
            letter-spacing: 0px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            transition: transform 0.3s ease;
        }

        .toggle-btn.collapsed {
            transform: rotate(-90deg);
        }

        .station-container {
            transition: all 0.3s ease;
            opacity: 1;
        }

        .station-container.hidden {
            display: none !important;
        }

        #xinshengcun-content,
        #tianshui-content,
        #tianshengyuan-content,
        #pingxin-content {
            display: none;
        }

        .error-container {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            color: #991b1b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-container.show {
            display: block;
        }

        .table-note {
            font-size: 12px;
            color: #999;
            text-align: right;
            margin-top: 10px;
            font-style: italic;
        }

        .bus-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: white;
            border: 1px solid #b3d9e0;
            border-radius: 8px;
            overflow: hidden;
            table-layout: fixed;
            box-shadow: 0 2px 8px rgba(23, 162, 184, 0.1);
        }

        .table-header {
            background: #d4ecf0;
            color: #0d7f94;
            font-weight: 700;
            text-align: center;
            font-size: 13px;
            text-transform: none;
            letter-spacing: 0px;
        }

        .table-header td {
            padding: 14px 12px;
            border: none;
        }

        .table-header td {
            width: 20%;
        }

        .table-header td:nth-child(1) {
            width: 20%;
        }

        .table-row {
            transition: background 0.2s ease;
        }

        .table-row:hover {
            background: #f0f9fb !important;
        }

        .table-row td {
            padding: 0px;
            text-align: center;
            border: none;
            vertical-align: middle;
            height: auto;
        }

        .table-row td.time-cell {
            padding: 12px 10px;
            height: 52px;
        }

        .table-row td:nth-child(1) {
            width: 25%;
            text-align: left;
        }

        .table-row td:nth-child(2),
        .table-row td:nth-child(3),
        .table-row td:nth-child(4) {
            width: 25%;
        }

        .table-row:last-child td {
            border-bottom: none;
        }

        .route-name {
            font-weight: 700;
            font-size: 16px;
            color: #667eea;
            text-align: left;
            padding-left: 20px;
        }

        .route-badge {
            font-weight: 700;
            font-size: 26px;
            padding: 10px 0px !important;
            border-radius: 6px;
            text-align: center;
            color: white;
            width: 100%;
            display: block;
            line-height: 1.4;
        }

        .route-name-row {
            background: #f0f9fb;
        }

        .route-name-row td {
            height: auto;
            padding: 12px 12px !important;
        }

        .badge-k75a {
            background: linear-gradient(135deg, #17a2b8 0%, #0d7f94 100%);
            color: white;
        }

        .badge-k75p {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: white;
        }

        .badge-53 {
            background: linear-gradient(135deg, #ff6f4a 0%, #ff5722 100%);
            color: white;
        }

        .badge-up {
            background: linear-gradient(135deg, #0d7f94 0%, #064757 100%);
            color: white;
        }

        .badge-276 {
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: white;
        }

        .table-row.row-k75a .direction-label {
            color: #0d7f94;
            font-weight: 700;
        }

        .table-row.row-k75p .direction-label {
            color: #ff9800;
            font-weight: 700;
        }

        .table-row.row-53 .direction-label {
            color: #ff6f4a;
            font-weight: 700;
        }

        .table-row.row-276 .direction-label {
            color: #ff9800;
            font-weight: 700;
        }

        .table-row.row-k65 .direction-label {
            color: #0d7f94;
            font-weight: 700;
        }

        .time-cell {
            font-size: 20px;
            font-weight: 700;
            color: #0d7f94;
            text-align: center;
            white-space: nowrap;
            vertical-align: middle;
        }

        .time-cell.soon {
            color: #d97706;
        }

        .time-cell.arriving {
            color: #dc2626;
            animation: pulse 1s infinite;
        }

        .direction-label {
            font-size: 18px;
            color: #374151;
            text-transform: none;
            font-weight: 600;
            letter-spacing: 0px;
            line-height: 1.4;
            padding: 12px 10px !important;
            border: none !important;
            text-align: center;
            background: white;
            width: 100% !important;
            display: block;
        }

        .mtr-row {
            background: none;
        }

        .kmb-badge {
            background: none;
        }

        .kmb-53 {
            background: none;
        }

        .kmb-53:last-of-type {
            padding-bottom: 20px;
        }

        .train-badge {
            background: none;
        }

        .train-mtr {
            background: none;
        }

        .train-mtr:last-of-type {
            padding-bottom: 20px;
        }

        .direction {
            flex: 1;
            margin-bottom: 0;
        }

        .direction-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid #334455;
        }

        .bus-item {
            background: #1a2749;
            border: 1px solid #334455;
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .bus-item:hover {
            border-color: #667eea;
            background: #2a3a59;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .bus-time {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .time-slot {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .eta {
            font-size: 18px;
            font-weight: 700;
            color: #51cf66;
            min-width: 60px;
            text-align: right;
        }

        .eta.soon {
            color: #ff922b;
        }

        .eta.arriving {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .time-label {
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .station-container {
            animation: fadeIn 0.4s ease-in-out;
        }

        .pixel-person {
            display: inline-block;
            font-size: 32px;
            margin-right: 8px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        .pixel-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .pixel-person-float {
            position: fixed;
            font-size: 28px;
            opacity: 0.25;
            animation: float-person 10s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes float-person {
            0%, 100% { transform: translateX(0px) translateY(0px); }
            25% { transform: translateX(30px) translateY(-15px); }
            50% { transform: translateX(60px) translateY(0px); }
            75% { transform: translateX(30px) translateY(15px); }
        }

        .person-1 {
            top: 20%;
            left: 5%;
        }

        .person-2 {
            top: 55%;
            right: 12%;
            animation: float-person 12s ease-in-out infinite 2s;
        }

        .person-3 {
            top: 75%;
            left: 15%;
            animation: float-person 14s ease-in-out infinite 4s;
        }

        .error {
            background: #2a1a1a;
            border-left: 4px solid #e74c3c;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .last-updated {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-weight: 500;
        }

        footer {
            border-top: 1px solid #d4ecf0;
            padding: 20px 28px;
            background: #f0f9fb;
            font-size: 13px;
            color: #66999f;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 28px;
                margin-bottom: 6px;
            }

            header {
                padding: 24px 20px;
            }

            main {
                padding: 24px 20px;
            }

            .station-header {
                padding: 18px 16px;
                margin-bottom: 16px;
            }

            .station-header h2 {
                font-size: 22px;
            }

            .route-badge {
                font-size: 22px;
                padding: 8px 8px !important;
            }

            .time-cell {
                font-size: 18px;
            }

            .direction-label {
                font-size: 16px;
                padding: 10px 10px !important;
            }

            .table-row td {
                padding: 10px 8px;
                height: 48px;
            }

            .table-header td {
                padding: 12px 8px;
            }

            .bus-table {
                border-radius: 8px;
                margin-bottom: 16px;
            }

            .last-updated {
                font-size: 12px;
                margin-top: 20px;
                padding-top: 16px;
            }

            footer {
                font-size: 12px;
                padding: 16px 20px;
            }

            .pixel-person-float {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-background">
        <div class="pixel-person-float person-1">🚌</div>
        <div class="pixel-person-float person-2">🚶</div>
        <div class="pixel-person-float person-3">🏃</div>
    </div>
    <div class="container">
        <header>
            <h1><span class="pixel-person">🚌</span>實時追車時間</h1>
        </header>

        <main>
            <!-- 新生村 -->
            <div class="station-header" onclick="toggleStation('xinshengcun')">
                <h2>📍 新生村</h2>
                <button class="toggle-btn" data-station="xinshengcun">▼</button>
            </div>

            <div id="xinshengcun" class="station-container" style="display: block;">
                <div id="xinshengcun-error" class="error-container"></div>
                <div id="xinshengcun-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載巴士數據...</p>
                </div>
                <div id="xinshengcun-content" style="display: none;"></div>
            </div>

            <!-- 天水圍站 -->
            <div class="station-header" onclick="toggleStation('tianshui')">
                <h2>🚆 天水圍站</h2>
                <button class="toggle-btn" data-station="tianshui">▼</button>
            </div>

            <div id="tianshui" class="station-container" style="display: block;">
                <div id="tianshui-error" class="error-container"></div>
                <div id="tianshui-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載列車數據...</p>
                </div>
                <div id="tianshui-content" style="display: none;"></div>
            </div>

            <!-- 天水圍站（天盛苑） -->
            <div class="station-header" onclick="toggleStation('tianshengyuan')">
                <h2>📍 天水圍站（天盛苑）</h2>
                <button class="toggle-btn" data-station="tianshengyuan">▼</button>
            </div>

            <div id="tianshengyuan" class="station-container" style="display: block;">
                <div id="tianshengyuan-error" class="error-container"></div>
                <div id="tianshengyuan-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載巴士數據...</p>
                </div>
                <div id="tianshengyuan-content" style="display: none;"></div>
            </div>

            <!-- 屏欣苑 -->
            <div class="station-header" onclick="toggleStation('pingxin')">
                <h2>📍 屏欣苑</h2>
                <button class="toggle-btn" data-station="pingxin">▼</button>
            </div>

            <div id="pingxin" class="station-container" style="display: block;">
                <div id="pingxin-error" class="error-container"></div>
                <div id="pingxin-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載巴士數據...</p>
                </div>
                <div id="pingxin-content" style="display: none;"></div>
            </div>

            <div class="last-updated">
                ⏱️ 每 10 秒自動更新 | 最後更新：<span id="lastUpdated">-</span>
            </div>
        </main>

        <footer>
            💡 數據來源：KMB 實時到站 API | 此工具在您的瀏覽器本機運行，不儲存任何個人數據。
        </footer>
    </div>

    <script src="js/bus-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
