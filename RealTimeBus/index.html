<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealTimeBus - 新生村 53 線實時到站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #0f3460;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        main {
            padding: 40px 30px;
            background: #0f3460;
        }

        .station-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .station-header h2 {
            font-size: 24px;
            margin: 0;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            transition: transform 0.3s ease;
        }

        .toggle-btn.collapsed {
            transform: rotate(-90deg);
        }

        .station-container {
            transition: all 0.3s ease;
        }

        .station-container.hidden {
            display: none !important;
        }

        .error-container {
            background: #2a1a1a;
            border-left: 4px solid #e74c3c;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-container.show {
            display: block;
        }

        .table-note {
            font-size: 12px;
            color: #999;
            text-align: right;
            margin-top: 10px;
            font-style: italic;
        }

        .bus-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #1a2749;
            border: 1px solid #334455;
            border-radius: 8px;
            overflow: hidden;
            table-layout: fixed;
        }

        .table-header {
            background: #334455;
            color: #aaa;
            font-weight: 600;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-header td {
            padding: 12px;
            border-bottom: 2px solid #667eea;
        }

        .table-header td:nth-child(1) {
            width: 25%;
            text-align: left;
        }

        .table-header td:nth-child(2),
        .table-header td:nth-child(3),
        .table-header td:nth-child(4) {
            width: 25%;
        }

        .table-row td {
            padding: 15px 12px;
            text-align: center;
            border-bottom: 1px solid #334455;
            vertical-align: middle;
            word-break: break-word;
        }

        .table-row td:nth-child(1) {
            width: 25%;
            text-align: left;
        }

        .table-row td:nth-child(2),
        .table-row td:nth-child(3),
        .table-row td:nth-child(4) {
            width: 25%;
        }

        .table-row:last-child td {
            border-bottom: none;
        }

        .route-name {
            font-weight: 700;
            font-size: 16px;
            color: #667eea;
            text-align: left;
            padding-left: 20px;
        }

        .route-badge {
            font-weight: 700;
            font-size: 14px;
            padding: 8px 12px !important;
            border-radius: 4px;
            text-align: center;
            color: white;
            width: fit-content;
            margin: auto;
        }

        .badge-k75a {
            background: linear-gradient(135deg, #ff9a56 0%, #ff7a3d 100%);
        }

        .badge-k75p {
            background: linear-gradient(135deg, #ffa94d 0%, #ff922b 100%);
        }

        .badge-53 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .badge-up {
            background: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
        }

        .time-cell {
            font-size: 16px;
            font-weight: 600;
            color: #51cf66;
        }

        .time-cell.soon {
            color: #ff922b;
        }

        .time-cell.arriving {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        .direction-label {
            font-size: 13px;
            color: #ccc;
            text-transform: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.2;
            padding: 4px 12px !important;
            border-bottom: none !important;
        }

        .mtr-row {
            background: rgba(255, 154, 86, 0.05);
        }

        .kmb-badge {
            background: rgba(102, 126, 234, 0.05);
        }

        .kmb-53 {
            background: rgba(102, 126, 234, 0.05);
        }

        .kmb-53:last-of-type {
            padding-bottom: 20px;
        }

        .train-badge {
            background: rgba(81, 207, 102, 0.05);
        }

        .train-mtr {
            background: rgba(81, 207, 102, 0.05);
        }

        .train-mtr:last-of-type {
            padding-bottom: 20px;
        }

        .direction {
            flex: 1;
            margin-bottom: 0;
        }

        .direction-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid #334455;
        }

        .bus-item {
            background: #1a2749;
            border: 1px solid #334455;
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .bus-item:hover {
            border-color: #667eea;
            background: #2a3a59;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .bus-time {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .time-slot {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .eta {
            font-size: 18px;
            font-weight: 700;
            color: #51cf66;
            min-width: 60px;
            text-align: right;
        }

        .eta.soon {
            color: #ff922b;
        }

        .eta.arriving {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .time-label {
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #334455;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #2a1a1a;
            border-left: 4px solid #e74c3c;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .last-updated {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #334455;
        }

        footer {
            border-top: 1px solid #334455;
            padding: 20px 30px;
            background: #0a1628;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 24px;
            }

            .station-info {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            main {
                padding: 20px;
            }

            .bus-table {
                font-size: 14px;
            }

            .table-row td {
                padding: 12px 8px;
            }

            .route-name {
                padding-left: 10px;
            }

            .bus-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .time-slot {
                width: 100%;
                justify-content: space-between;
            }

            .eta {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚌 RealTimeBus</h1>
            <p>新生村 KMB 53 線實時到站時間</p>
        </header>

        <main>
            <!-- 新生村 -->
            <div class="station-header" onclick="toggleStation('xinshengcun')">
                <h2>📍 新生村</h2>
                <button class="toggle-btn" data-station="xinshengcun">▼</button>
            </div>

            <div id="xinshengcun" class="station-container" style="display: block;">
                <div id="xinshengcun-error" class="error-container"></div>
                <div id="xinshengcun-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載巴士數據...</p>
                </div>
                <div id="xinshengcun-content" style="display: none;"></div>
                <div class="table-note">表格：最快班次 / 下一班 / 下下班</div>
            </div>

            <!-- 屏欣苑 -->
            <div class="station-header" onclick="toggleStation('pingxin')">
                <h2>📍 屏欣苑</h2>
                <button class="toggle-btn" data-station="pingxin">▼</button>
            </div>

            <div id="pingxin" class="station-container" style="display: block;">
                <div id="pingxin-error" class="error-container"></div>
                <div id="pingxin-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載巴士數據...</p>
                </div>
                <div id="pingxin-content" style="display: none;"></div>
            </div>

            <!-- 天水圍站 -->
            <div class="station-header" onclick="toggleStation('tianshui')">
                <h2>🚆 天水圍站</h2>
                <button class="toggle-btn" data-station="tianshui">▼</button>
            </div>

            <div id="tianshui" class="station-container" style="display: block;">
                <div id="tianshui-error" class="error-container"></div>
                <div id="tianshui-loading" class="loading">
                    <div class="spinner"></div>
                    <p>正在加載列車數據...</p>
                </div>
                <div id="tianshui-content" style="display: none;"></div>
            </div>

            <div class="last-updated">
                ⏱️ 每 10 秒自動更新 | 最後更新：<span id="lastUpdated">-</span>
            </div>
        </main>

        <footer>
            💡 數據來源：KMB 實時到站 API | 此工具在您的瀏覽器本機運行，不儲存任何個人數據。
        </footer>
    </div>

    <script src="js/bus-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
