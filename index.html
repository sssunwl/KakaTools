<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaSa小工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border-bottom: 1px solid #334455;
        }

        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 5px;
        }

        header .version {
            font-size: 12px;
            color: #666;
        }

        main {
            flex: 1;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: #0f3460;
            border: 2px solid #334455;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tool-card:hover {
            border-color: #667eea;
            background: #1a2749;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .tool-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .tool-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .tool-description {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
        }

        .coming-soon {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .coming-soon:hover {
            border-color: #334455;
            background: #0f3460;
            transform: none;
            box-shadow: none;
        }

        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
        }

        footer {
            border-top: 1px solid #334455;
            padding: 40px 20px;
            background: #0a1628;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        footer p {
            margin-bottom: 10px;
        }

        .suniverse-logo {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 36px;
            }

            main {
                padding: 40px 15px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🛠️ MaSa小工具</h1>
        <p>實用工具集合</p>
        <div class="version">v1.0</div>
    </header>

    <main>
        <div class="tools-grid">
            <!-- 運單工具 -->
            <a href="waybill-prefill/" class="tool-card">
                <div class="tool-icon">📦</div>
                <div class="tool-name">運單預填工具</div>
                <div class="tool-description">
                    Invoice + Packing List → DHL / FedEx / UPS 運單欄位自動抽取
                </div>
                <div class="badge">✓ 已上線</div>
            </a>

            <!-- 預留位置 -->
            <div class="tool-card coming-soon">
                <div class="tool-icon">📊</div>
                <div class="tool-name">即將推出</div>
                <div class="tool-description">
                    敬請期待更多實用工具...
                </div>
                <div class="badge">即將上線</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="suniverse-logo">✨ Suniverse</div>
        <p>© 2026 Suniverse. All rights reserved.</p>
        <p>A universe built by S.</p>
    </footer>
</body>
</html>
