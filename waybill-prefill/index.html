<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運單預填工具 - Invoice/Packing List → DHL/FedEx/UPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #0f3460;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        main {
            padding: 40px 30px;
            background: #0f3460;
            color: #e0e0e0;
        }

        .step {
            margin-bottom: 40px;
        }

        .step-number {
            display: inline-block;
            width: 36px;
            height: 36px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            margin-right: 12px;
            font-size: 16px;
        }

        .step-title {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
            display: inline-block;
            vertical-align: middle;
        }

        .step-content {
            margin-left: 48px;
            margin-top: 15px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #1a2749;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #2a3a59;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #3a4a69;
        }

        .upload-area p {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .upload-area small {
            color: #999;
            display: block;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #1a2749;
            border: 1px solid #334455;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 14px;
            color: #e0e0e0;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .file-type-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .file-type-selector label {
            font-size: 12px;
            color: #aaa;
        }

        .file-type-selector select {
            background: #0f1e2e;
            border: 1px solid #334455;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .file-type-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-remove {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-remove:hover {
            background: #c0392b;
        }

        .btn-parse {
            margin-top: 30px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-parse:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-parse:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            margin-top: 40px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #334455;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #999;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.show {
            display: block;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .field-card {
            border: 1px solid #334455;
            border-radius: 8px;
            padding: 16px;
            background: #1a2749;
            transition: all 0.3s ease;
        }

        .field-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .field-card.error {
            background: #2a1a1a;
            border-color: #e74c3c;
        }

        .field-label {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .field-value {
            font-size: 15px;
            color: #e0e0e0;
            word-break: break-word;
            line-height: 1.5;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            background: #0f1e2e;
            padding: 8px;
            border-radius: 4px;
            min-height: 24px;
        }

        .field-value.missing {
            color: #e74c3c;
            font-style: italic;
        }

        .field-value.missing::before {
            content: "❌ ";
        }

        .btn-copy {
            width: 100%;
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: #764ba2;
        }

        .btn-copy.copied {
            background: #27ae60;
        }

        .error-message {
            background: #2a1a1a;
            border-left: 4px solid #e74c3c;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            font-size: 14px;
        }

        .success-message {
            background: #1a2a1a;
            border-left: 4px solid #27ae60;
            color: #51cf66;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            border-top: 1px solid #334455;
            padding: 20px 30px;
            background: #0a1628;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 22px;
            }

            main {
                padding: 25px 15px;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .fields-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 運單預填工具</h1>
            <p>Invoice + Packing List → DHL / FedEx / UPS 運單欄位</p>
        </header>

        <main>
            <!-- Step 1: Upload -->
            <div class="step">
                <div>
                    <span class="step-number">1</span>
                    <span class="step-title">上傳 PDF 文件</span>
                </div>
                <div class="step-content">
                    <div class="upload-area" id="uploadArea">
                        <p>📂 拖拉 PDF 文件到這裡</p>
                        <small>或點擊選擇檔案（支援多檔上傳）</small>
                        <input type="file" id="fileInput" accept=".pdf" multiple>
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>
            </div>

            <!-- Step 2: Parse -->
            <div class="step">
                <div>
                    <span class="step-number">2</span>
                    <span class="step-title">解析並查看結果</span>
                </div>
                <div class="step-content">
                    <button class="btn-parse" id="parseBtn" disabled>
                        解析 PDF
                    </button>
                </div>
            </div>

            <!-- Step 3: Results -->
            <div class="step">
                <div>
                    <span class="step-number">3</span>
                    <span class="step-title">複製欄位到運單表單</span>
                </div>
                <div class="step-content results" id="results">
                    <div id="errorContainer"></div>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('dhl')">
                            📮 DHL Express
                        </button>
                        <button class="tab-btn" onclick="switchTab('fedex')">
                            🚚 FedEx
                        </button>
                        <button class="tab-btn" onclick="switchTab('ups')">
                            📤 UPS
                        </button>
                    </div>

                    <div id="dhl" class="tab-content show"></div>
                    <div id="fedex" class="tab-content"></div>
                    <div id="ups" class="tab-content"></div>
                </div>
            </div>
        </main>

        <footer>
            💡 提示：此工具在您的瀏覽器本機運行，不上傳任何資料到伺服器。PDF 內容完全隱私。
        </footer>
    </div>

    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Custom scripts -->
    <script src="js/carrier-mapping.js"></script>
    <script src="js/pdf-parser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
